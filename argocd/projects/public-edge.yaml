apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: public-edge
spec:
  description: Optional public edge addon stack for workload clusters
  sourceRepos:
    - https://github.com/litomi2026/litomi-gitops.git
  destinations:
    - name: stg-01
      namespace: cloudflared
    - name: stg-01
      namespace: gtm-server
    - name: stg-01
      namespace: litomi
    - name: stg-01
      namespace: monitoring
    - name: prod-01
      namespace: cloudflared
    - name: prod-01
      namespace: gtm-server
    - name: prod-01
      namespace: litomi
    - name: prod-01
      namespace: monitoring
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  orphanedResources:
    warn: true
  permitOnlyProjectScopedClusters: true
