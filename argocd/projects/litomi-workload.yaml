apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: litomi-workload
spec:
  description: Litomi workloads, env-local runtime data plane, and public exposure for environment-runtime clusters
  sourceRepos:
    - https://github.com/litomi2026/litomi-gitops.git
    - https://charts.bitnami.com/bitnami
  destinations:
    - name: '*'
      namespace: litomi
    - name: '*'
      namespace: cloudflared
    - name: '*'
      namespace: gtm-server
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: scheduling.k8s.io
      kind: PriorityClass
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  orphanedResources:
    warn: true
  permitOnlyProjectScopedClusters: true
