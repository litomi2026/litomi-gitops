apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-clusters
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            tenant: litomi
            role: workload
  template:
    metadata:
      name: platform-{{name}}
    spec:
      project: bootstrap-admin
      source:
        repoURL: https://github.com/litomi2026/litomi-gitops.git
        targetRevision: main
        path: clusters/{{name}}/platform
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
