apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: litomi-clusters
spec:
  generators:
    - clusters:
        selector:
          matchExpressions:
            - key: tenant
              operator: In
              values:
                - litomi
            - key: litomi.io/cluster-class
              operator: In
              values:
                - environment-runtime
            - key: environment
              operator: In
              values:
                - prod
                - stg
                - dev
  template:
    metadata:
      name: litomi-{{name}}
    spec:
      project: bootstrap-admin
      source:
        repoURL: https://github.com/litomi2026/litomi-gitops.git
        targetRevision: main
        path: clusters/{{name}}/litomi
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
