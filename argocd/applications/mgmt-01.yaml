apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mgmt-01
  annotations:
    argocd.argoproj.io/sync-wave: '0'
spec:
  project: bootstrap-admin
  source:
    repoURL: https://github.com/litomi2026/litomi-gitops.git
    targetRevision: main
    path: clusters/mgmt-01
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
