apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: vault
  target:
    name: grafana-admin
    creationPolicy: Owner
    deletionPolicy: Delete
  dataFrom:
    - extract:
        key: clusters/prod-01/monitoring/grafana-admin
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
