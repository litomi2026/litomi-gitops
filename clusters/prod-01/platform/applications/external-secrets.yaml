apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-01-external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '1'
spec:
  project: platform-workload
  sources:
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: 2.2.0
      helm:
        releaseName: external-secrets
        valueFiles:
          - $values/apps/platform/external-secrets/external-secrets.values.yaml
    - repoURL: https://github.com/litomi2026/litomi-gitops.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/litomi2026/litomi-gitops.git
      targetRevision: main
      path: apps/platform/external-secrets
  destination:
    name: prod-01
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
