apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-01-litomi-redis
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '1'
spec:
  project: litomi-workload
  sources:
    - repoURL: https://charts.bitnami.com/bitnami
      chart: valkey
      targetRevision: 5.4.9
      helm:
        releaseName: redis
        valueFiles:
          - $values/clusters/prod-01/litomi/redis/values.yaml
    - repoURL: https://github.com/litomi2026/litomi-gitops.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/litomi2026/litomi-gitops.git
      targetRevision: main
      path: clusters/prod-01/litomi/redis
  destination:
    name: prod-01
    namespace: litomi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
