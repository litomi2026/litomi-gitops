fullnameOverride: redis

architecture: standalone

auth:
  enabled: true
  existingSecret: litomi-backend-secret
  existingSecretPasswordKey: REDIS_PASSWORD
  usePasswordFiles: true
  usePasswordFileFromSecret: true

primary:
  priorityClassName: litomi-runtime
  startupProbe:
    enabled: true
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: valkey
          app.kubernetes.io/instance: redis
  pdb:
    create: false
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

metrics:
  enabled: false

networkPolicy:
  enabled: false
