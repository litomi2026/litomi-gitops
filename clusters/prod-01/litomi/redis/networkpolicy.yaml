apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: valkey
      app.kubernetes.io/instance: redis-ha
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: valkey
              app.kubernetes.io/instance: redis-ha
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 26379
    - from:
        - podSelector:
            matchLabels:
              app: litomi-web
        - podSelector:
            matchLabels:
              app: litomi-backend
      ports:
        - protocol: TCP
          port: 6379
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9121
