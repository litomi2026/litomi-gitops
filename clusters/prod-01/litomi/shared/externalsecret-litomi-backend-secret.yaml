apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litomi-backend-secret
  namespace: litomi
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: SecretStore
    name: vault
  target:
    name: litomi-backend-secret
    creationPolicy: Owner
    deletionPolicy: Delete
  dataFrom:
    - extract:
        key: clusters/prod-01/litomi/litomi-backend-secret
