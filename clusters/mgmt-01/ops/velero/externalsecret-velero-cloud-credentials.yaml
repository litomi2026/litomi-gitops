apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: velero-cloud-credentials
  namespace: velero
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: vault
  target:
    name: velero-cloud-credentials
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: cloud
      remoteRef:
        key: clusters/mgmt-01/velero/velero-cloud-credentials
        property: cloud
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
