apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mgmt-01-monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '5'
spec:
  project: platform-mgmt
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 82.18.0
      helm:
        releaseName: kube-prometheus-stack
        valueFiles:
          - $values/apps/platform/monitoring/kube-prometheus-stack.values.yaml
          - $values/clusters/mgmt-01/ops/monitoring/values.yaml
    - repoURL: https://github.com/litomi2026/litomi-gitops.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/litomi2026/litomi-gitops.git
      targetRevision: main
      path: clusters/mgmt-01/ops/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
