apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

resources:
  - ../../../../apps/platform/minio
  - secretstore-vault.yaml
  - externalsecret-minio-env-configuration.yaml
  - ingress.yaml

configMapGenerator:
  - name: vault-ca
    files:
      - ca.crt=../../../../bootstrap/pki/vault-ca.pem
