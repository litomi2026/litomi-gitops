apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stg-01-litomi-edge
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '4'
spec:
  project: litomi-workload
  source:
    repoURL: https://github.com/litomi2026/litomi-gitops.git
    targetRevision: main
    path: clusters/stg-01/litomi/edge
  destination:
    name: stg-01
    namespace: litomi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
