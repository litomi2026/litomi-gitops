apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stg-01-litomi-public-edge
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '5'
spec:
  project: bootstrap-admin
  source:
    repoURL: https://github.com/litomi2026/litomi-gitops.git
    targetRevision: main
    path: clusters/stg-01/litomi/public-edge
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
