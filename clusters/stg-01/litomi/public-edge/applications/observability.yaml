apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stg-01-litomi-observability
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '6'
spec:
  project: litomi-workload
  source:
    repoURL: https://github.com/litomi2026/litomi-gitops.git
    targetRevision: main
    path: clusters/stg-01/litomi/public-edge/observability
  destination:
    name: stg-01
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
