fullnameOverride: redis-ha

architecture: replication

auth:
  enabled: true
  sentinel: true
  existingSecret: litomi-backend-secret
  existingSecretPasswordKey: REDIS_PASSWORD
  usePasswordFiles: true
  usePasswordFileFromSecret: true

sentinel:
  enabled: true
  quorum: 2
  primarySet: litomi
  service:
    createPrimary: false
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

primary:
  podAntiAffinityPreset: hard
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: valkey
          app.kubernetes.io/instance: redis-ha
  startupProbe:
    enabled: true
  persistence:
    enabled: true
    size: 4Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

replica:
  replicaCount: 2
  podAntiAffinityPreset: hard
  startupProbe:
    enabled: true
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: valkey
          app.kubernetes.io/instance: redis-ha
  pdb:
    create: true
    minAvailable: 1
  persistence:
    enabled: true
    size: 4Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: monitoring
    additionalLabels:
      release: kube-prometheus-stack
      app.kubernetes.io/instance: kube-prometheus-stack
    additionalEndpoints:
      - interval: 30s
        path: /scrape
        port: metrics
        params:
          target:
            - localhost:26379
        metricRelabelings:
          - targetLabel: app
            replacement: sentinel

networkPolicy:
  enabled: false
