resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 150m
    memory: 128Mi

serviceMonitor:
  interval: 60s

config:
  outputs: |
    [OUTPUT]
        Name loki
        Match kube.*
        Host loki.logging.svc
        Port 3100
        Labels cluster=stg-01,job=fluent-bit
        Auto_Kubernetes_Labels On
        Line_Format json
        Retry_Limit False
