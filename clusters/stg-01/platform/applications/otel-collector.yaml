apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stg-01-otel-collector
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '5'
spec:
  project: platform-stg
  sources:
    - repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      chart: opentelemetry-collector
      targetRevision: 0.145.0
      helm:
        releaseName: opentelemetry-collector
        valueFiles:
          - $values/apps/platform/tracing/base/opentelemetry-collector.values.yaml
          - $values/clusters/stg-01/platform/tracing/opentelemetry-collector.values.yaml
    - repoURL: https://github.com/litomi2026/litomi-gitops.git
      targetRevision: main
      ref: values
  destination:
    name: stg-01
    namespace: tracing
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
