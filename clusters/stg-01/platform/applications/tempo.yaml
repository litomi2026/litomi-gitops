apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stg-01-tempo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '4'
spec:
  project: platform-stg
  sources:
    - repoURL: https://grafana-community.github.io/helm-charts
      chart: tempo
      targetRevision: 1.26.1
      helm:
        releaseName: tempo
        valueFiles:
          - $values/apps/platform/tracing/base/tempo.values.yaml
          - $values/clusters/stg-01/platform/tracing/tempo.values.yaml
    - repoURL: https://github.com/litomi2026/litomi-gitops.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/litomi2026/litomi-gitops.git
      targetRevision: main
      path: apps/platform/tracing/overlays/stg
  destination:
    name: stg-01
    namespace: tracing
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
