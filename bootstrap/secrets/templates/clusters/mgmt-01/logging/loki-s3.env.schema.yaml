apiVersion: secrets.litomi.io/v1alpha1
kind: VaultSecretTemplate
spec:
  vaultPath: clusters/mgmt-01/logging/loki-s3
  owner: mgmt-01/ops/logging
  consumerFiles:
    - clusters/mgmt-01/ops/logging/externalsecret-loki-minio.yaml
  allowAdditionalKeys: false
  requiredKeys:
    - access_key
    - secret_key
    - bucket_chunks
    - bucket_ruler
  placeholderPatterns:
    - '^replace-with-s3-access-key$'
    - '^replace-with-s3-secret-key$'
