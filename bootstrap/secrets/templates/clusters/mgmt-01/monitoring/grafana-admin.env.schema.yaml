apiVersion: secrets.litomi.io/v1alpha1
kind: VaultSecretTemplate
spec:
  vaultPath: clusters/mgmt-01/monitoring/grafana-admin
  owner: mgmt-01/ops/monitoring
  consumerFiles:
    - clusters/mgmt-01/ops/monitoring/externalsecret-grafana-admin.yaml
  allowAdditionalKeys: false
  requiredKeys:
    - admin_user
    - admin_password
  placeholderPatterns:
    - '^replace-with-strong-password$'
