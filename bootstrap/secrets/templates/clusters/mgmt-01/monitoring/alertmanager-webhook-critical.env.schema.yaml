apiVersion: secrets.litomi.io/v1alpha1
kind: VaultSecretTemplate
spec:
  vaultPath: clusters/mgmt-01/monitoring/alertmanager-webhook-critical
  owner: mgmt-01/ops/monitoring
  consumerFiles:
    - clusters/mgmt-01/ops/monitoring/externalsecret-alertmanager-webhook-critical.yaml
  allowAdditionalKeys: false
  requiredKeys:
    - url
  placeholderPatterns:
    - 'replace-critical'
  valueValidators:
    - key: url
      mustContain:
        - https://
