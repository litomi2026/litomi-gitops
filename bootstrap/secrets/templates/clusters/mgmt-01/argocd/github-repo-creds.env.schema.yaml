apiVersion: secrets.litomi.io/v1alpha1
kind: VaultSecretTemplate
spec:
  vaultPath: clusters/mgmt-01/argocd/github-repo-creds
  owner: mgmt-01/central-services/argocd-config
  consumerFiles:
    - clusters/mgmt-01/central-services/argocd-config/externalsecret-github-repo-creds.yaml
  allowAdditionalKeys: false
  requiredKeys:
    - url
    - type
    - githubAppID
    - githubAppInstallationID
    - githubAppPrivateKey
  optionalKeys:
    - githubAppEnterpriseBaseUrl
  placeholderPatterns:
    - '^replace-with-github-app-id$'
    - '^replace-with-github-app-installation-id$'
    - 'replace-with-github-app-private-key'
  valueValidators:
    - key: githubAppPrivateKey
      mustContain:
        - BEGIN RSA PRIVATE KEY
