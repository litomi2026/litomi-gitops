apiVersion: secrets.litomi.io/v1alpha1
kind: VaultSecretTemplate
spec:
  vaultPath: clusters/mgmt-01/minio/minio-root
  owner: mgmt-01/central-services/minio
  consumerFiles:
    - clusters/mgmt-01/central-services/minio/externalsecret-minio-env-configuration.yaml
  allowAdditionalKeys: false
  requiredKeys:
    - root_user
    - root_password
  placeholderPatterns:
    - '^replace-with-strong-password$'
