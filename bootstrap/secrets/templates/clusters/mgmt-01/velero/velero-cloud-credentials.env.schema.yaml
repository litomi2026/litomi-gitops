apiVersion: secrets.litomi.io/v1alpha1
kind: VaultSecretTemplate
spec:
  vaultPath: clusters/mgmt-01/velero/velero-cloud-credentials
  owner: mgmt-01/ops/velero
  consumerFiles:
    - clusters/mgmt-01/ops/velero/externalsecret-velero-cloud-credentials.yaml
  allowAdditionalKeys: false
  requiredKeys:
    - cloud
  placeholderPatterns:
    - 'replace-with-access-key'
    - 'replace-with-secret-key'
  valueValidators:
    - key: cloud
      mustContain:
        - aws_access_key_id=
        - aws_secret_access_key=
