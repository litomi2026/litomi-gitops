apiVersion: secrets.litomi.io/v1alpha1
kind: VaultSecretTemplate
spec:
  vaultPath: clusters/mgmt-01/tracing/tempo-s3
  owner: mgmt-01/ops/tracing
  consumerFiles:
    - clusters/mgmt-01/ops/tracing/externalsecret-tempo-minio.yaml
  allowAdditionalKeys: false
  requiredKeys:
    - access_key
    - secret_key
    - bucket_traces
  placeholderPatterns:
    - '^replace-with-s3-access-key$'
    - '^replace-with-s3-secret-key$'
