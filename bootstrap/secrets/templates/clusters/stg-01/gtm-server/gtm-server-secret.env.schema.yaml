apiVersion: secrets.litomi.io/v1alpha1
kind: VaultSecretTemplate
spec:
  vaultPath: clusters/stg-01/gtm-server/gtm-server-secret
  owner: stg-01/litomi/public-edge/gtm-server
  consumerFiles:
    - clusters/stg-01/litomi/public-edge/gtm-server/externalsecret-gtm-server-secret.yaml
  allowAdditionalKeys: false
  requiredKeys:
    - CONTAINER_CONFIG
  placeholderPatterns:
    - 'replace-me'
  valueValidators:
    - key: CONTAINER_CONFIG
      mustContain:
        - '"accountId"'
        - '"containerId"'
        - '"workspaceId"'
        - '"private_key"'
