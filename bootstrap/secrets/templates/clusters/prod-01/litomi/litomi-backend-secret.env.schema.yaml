apiVersion: secrets.litomi.io/v1alpha1
kind: VaultSecretTemplate
spec:
  vaultPath: clusters/prod-01/litomi/litomi-backend-secret
  owner: prod-01/litomi/shared
  consumerFiles:
    - clusters/prod-01/litomi/shared/externalsecret-litomi-backend-secret.yaml
  allowAdditionalKeys: true
  requiredKeys:
    - REDIS_PASSWORD
    - REDIS_URL
  optionalKeys:
    - DATABASE_URL
    - DIRECT_URL
    - JWT_SECRET
    - TURNSTILE_SECRET_KEY
    - VAPID_PRIVATE_KEY
    - GOOGLE_CLOUD_PROJECT
    - GOOGLE_CLIENT_EMAIL
    - GOOGLE_PRIVATE_KEY
  placeholderPatterns:
    - 'replace-me'
    - 'replace-with-strong-redis-password'
    - 'replace-with-external-db-host'
  valueValidators:
    - key: REDIS_URL
      mustContain:
        - '@redis:6379'
      mustNotContain:
        - '.shared.'
        - '.mgmt.'
