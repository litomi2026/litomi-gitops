apiVersion: secrets.litomi.io/v1alpha1
kind: VaultSecretTemplate
spec:
  vaultPath: clusters/prod-01/cloudflared/cloudflared-token
  owner: prod-01/litomi/public-edge/cloudflared
  consumerFiles:
    - clusters/prod-01/litomi/public-edge/cloudflared/externalsecret-cloudflared-token.yaml
  allowAdditionalKeys: false
  requiredKeys:
    - token
  placeholderPatterns:
    - '^replace-with-cloudflared-token$'
