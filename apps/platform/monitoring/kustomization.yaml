apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

generatorOptions:
  disableNameSuffixHash: true

resources:
  - namespace.yaml
  - serviceaccount-eso-vault.yaml
  - alertmanagerconfig-discord.yaml
  - prometheusrule-observability-pipeline.yaml
  - configmap-blackbox-exporter.yaml
  - deployment-blackbox-exporter.yaml
  - service-blackbox-exporter.yaml

configMapGenerator:
  - name: vault-ca
    files:
      - ca.crt=../../../bootstrap/pki/vault-ca.pem
