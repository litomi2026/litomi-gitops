apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gtm-server-tagging
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gtm-server-tagging
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
