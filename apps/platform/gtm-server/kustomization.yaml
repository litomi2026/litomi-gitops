apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gtm-server

generatorOptions:
  disableNameSuffixHash: true

resources:
  - namespace.yaml
  - serviceaccount-eso-vault.yaml
  - deployment-preview.yaml
  - service-preview.yaml
  - deployment-tagging.yaml
  - service-tagging.yaml
  - hpa-tagging.yaml

configMapGenerator:
  - name: vault-ca
    files:
      - ca.crt=../../../bootstrap/pki/vault-ca.pem
