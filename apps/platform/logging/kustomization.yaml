apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: logging

generatorOptions:
  disableNameSuffixHash: true

resources:
  - namespace.yaml
  - serviceaccount-eso-vault.yaml

configMapGenerator:
  - name: vault-ca
    files:
      - ca.crt=../../../bootstrap/pki/vault-ca.pem
