apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: otel-collector-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-collector
      app.kubernetes.io/instance: opentelemetry-collector
  policyTypes:
    - Ingress
  ingress:
    # App namespaces push traces to the collector via OTLP.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: litomi
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    # Prometheus in monitoring namespace scrapes collector metrics.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8888
