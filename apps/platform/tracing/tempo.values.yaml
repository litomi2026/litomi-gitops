# Tempo Helm chart values (grafana-community/tempo)

replicas: 1

tempo:
  reportingEnabled: false
  retention: 72h
  extraArgs:
    # Tempo config에서 ${ENV}를 확장해 Secret 값을 주입해요.
    # https://grafana.com/docs/tempo/latest/configuration/
    config.expand-env: 'true'
  extraEnv:
    - name: TEMPO_S3_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: tempo-minio
          key: access_key
    - name: TEMPO_S3_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: tempo-minio
          key: secret_key
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      cpu: '1'
      memory: 2Gi
  storage:
    trace:
      backend: s3
      s3:
        bucket: ${TEMPO_BUCKET_TRACES}
        endpoint: minio.mgmt.litomi.internal
        access_key: ${TEMPO_S3_ACCESS_KEY}
        secret_key: ${TEMPO_S3_SECRET_KEY}
        insecure: true
      wal:
        path: /var/tempo/wal
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

persistence:
  enabled: true
  size: 30Gi

serviceMonitor:
  enabled: true
  interval: 30s
  additionalLabels:
    release: kube-prometheus-stack
    app.kubernetes.io/instance: kube-prometheus-stack
