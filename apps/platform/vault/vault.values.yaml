# HashiCorp Vault OSS (Helm chart: hashicorp/vault)
#
# - TLS is enabled (bring-your-own `vault-tls` Secret; do NOT commit certs/keys to Git).
# - Storage: integrated Raft (PV-backed).
# - Auth: Kubernetes auth methods are bootstrapped by the management script.
#
# Ref (chart values): https://github.com/hashicorp/vault-helm

global:
  tlsDisable: false

injector:
  enabled: false

server:
  updateStrategyType: RollingUpdate

  statefulSet:
    securityContext:
      pod:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      container:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault

  auditStorage:
    enabled: true
    size: 10Gi

  extraVolumes:
    - type: secret
      name: vault-tls

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: '2'
      memory: 2Gi

  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true
        disable_mlock = true

        listener "tcp" {
          tls_disable = 0
          address = "[::]:8200"
          cluster_address = "[::]:8201"
          tls_cert_file = "/vault/userconfig/vault-tls/tls.crt"
          tls_key_file  = "/vault/userconfig/vault-tls/tls.key"
        }

        storage "raft" {
          path = "/vault/data"
        }

        service_registration "kubernetes" {}
