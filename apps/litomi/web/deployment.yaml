apiVersion: apps/v1
kind: Deployment
metadata:
  name: litomi-web
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: litomi-web
  template:
    metadata:
      labels:
        app: litomi-web
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false
      priorityClassName: litomi-runtime
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: litomi-web
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: litomi-web
      containers:
        - name: web
          image: litomi-web:prod
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: '3000'
          envFrom:
            - configMapRef:
                name: litomi-public-env
            - configMapRef:
                name: litomi-common-env
            - configMapRef:
                name: litomi-web-env
            - secretRef:
                name: litomi-backend-secret
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep 10
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            timeoutSeconds: 3
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 200m
              memory: 896Mi
            limits:
              cpu: 1000m
              memory: 1280Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            capabilities:
              drop:
                - ALL
