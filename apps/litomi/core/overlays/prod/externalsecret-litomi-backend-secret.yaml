apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litomi-backend-secret
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: SecretStore
    name: vault
  target:
    name: litomi-backend-secret
    creationPolicy: Owner
    deletionPolicy: Delete
  dataFrom:
    - extract:
        key: litomi-prod/litomi-backend-secret
